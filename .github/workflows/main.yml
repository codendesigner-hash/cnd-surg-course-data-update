name: Sync Course Data

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and convert CSV to JSON
        run: |
          curl -L "https://docs.google.com/spreadsheets/d/1Ia7hF9vLGfdlMp-yItvCZMMYCMlPWRSJ_Lr_5dDIZD8/gviz/tq?tqx=out:csv&sheet=Course%20Ratings" -o data.csv
          python3 -c "
          import csv, json, os
          with open('data.csv', newline='', encoding='utf-8') as f:
              new_rows = list(csv.DictReader(f))
          KEY = 'Course Link'
          existing = []
          if os.path.exists('ratings.json'):
              with open('ratings.json', encoding='utf-8') as f:
                  existing = json.load(f)
          merged = {r[KEY]: r for r in existing if r.get(KEY)}
          for row in new_rows:
              key = row.get(KEY, '').strip()
              if key:
                  if key in merged:
                      for k, v in row.items():
                          if str(v).strip():
                              merged[key][k] = v
                  else:
                      merged[key] = row
          out = list(merged.values())
          for r in out:
              if 'Course Link' in r and 'Course link' not in r:
                  r['Course link'] = r['Course Link']
          with open('ratings.json', 'w', encoding='utf-8') as f:
              json.dump(out, f, ensure_ascii=False)
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ratings.json
          git diff --staged --quiet || git commit -m "Update course data"
          git push
